apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: zenml-db-staging-store
  namespace: postgres
spec:
  retentionPolicy: "60d"
  configuration:
    destinationPath: s3://hotosm-k8s-db-backup/zenml-staging
    endpointURL: https://s3.amazonaws.com
    s3Credentials:
      accessKeyId:
        name: s3-creds
        key: access-key-id
      secretAccessKey:
        name: s3-creds
        key: secret-access-key
    wal:
      compression: gzip
      encryption: AES256
    data:
      compression: gzip
      encryption: AES256
      jobs: 2

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: zenml-db-staging
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/version: 18-system-trixie

spec:
  instances: 1
  description: "ZenML Staging Database (recovered from zenml-db-prod)"
  imageName: "ghcr.io/cloudnative-pg/postgresql:18-system-trixie"

  primaryUpdateStrategy: unsupervised
  # PDB (voluntary-eviction guard) disabled - single replica would otherwise block node drains on cluster upgrade
  enablePDB: false

  postgresql:
    parameters:
      idle_in_transaction_session_timeout: "60s"

  externalClusters:
    - name: zenml-db-prod
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: zenml-db-prod-store
          serverName: zenml-db-prod

  storage:
    storageClass: gp3
    size: 20Gi
  walStorage:
    storageClass: gp3
    size: 40Gi

  monitoring:
    enablePodMonitor: false

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: zenml-db-staging-store

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: zenml-db-staging-backup
  namespace: postgres
spec:
  schedule: "0 0 3 * * 6"  # At 03:00 UTC every Saturday
  backupOwnerReference: self
  cluster:
    name: zenml-db-staging
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
