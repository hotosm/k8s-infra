apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: windmill-db-store
  namespace: postgres
spec:
  retentionPolicy: "60d"
  configuration:
    destinationPath: s3://hotosm-k8s-db-backup/windmill
    endpointURL: https://s3.amazonaws.com
    s3Credentials:
      accessKeyId:
        name: s3-creds
        key: access-key-id
      secretAccessKey:
        name: s3-creds
        key: secret-access-key
    wal:
      compression: gzip # this saves a lot of storage
      encryption: AES256 # AWS managed
    data:
      compression: gzip
      encryption: AES256 # AWS managed
      jobs: 2

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: windmill-db
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/version: 18-system-trixie

spec:
  instances: 1
  description: "Windmill Database"
  imageName: "ghcr.io/cloudnative-pg/postgresql:18-system-trixie"

  primaryUpdateStrategy: unsupervised
  # PDB (voluntary-eviction guard) disabled - single replica would otherwise block node drains on cluster upgrade
  enablePDB: false

  postgresql:
    parameters:
      # Kill idle-in-transaction sessions after 60s to release locks held by abandoned txns.
      idle_in_transaction_session_timeout: "60s"

  bootstrap:
    initdb:
      database: windmill
      owner: windmill
      secret:
        # Kubernetes basic-auth convention has keys:
        # - username
        # - password
        name: windmill-db-creds
      # Windmill's migrations GRANT to roles windmill_admin / windmill_user
      # and expect them to already exist (see init-db-as-superuser.sql in
      # the windmill repo). Runs as superuser against the windmill db.
      postInitApplicationSQL:
        - CREATE ROLE windmill_user;
        - CREATE ROLE windmill_admin WITH BYPASSRLS;
        - GRANT windmill_user TO windmill_admin;
        - GRANT windmill_admin TO windmill;
        - GRANT windmill_user TO windmill;
        # Migrations run as the `windmill` user, so default privileges must
        # be set FOR ROLE windmill - otherwise tables created during migration
        # are owned by `windmill` and the SET ROLE windmill_admin/windmill_user
        # that Windmill uses per-request (for RLS) has no access.
        - ALTER DEFAULT PRIVILEGES FOR ROLE windmill IN SCHEMA public GRANT ALL ON TABLES TO windmill_admin;
        - ALTER DEFAULT PRIVILEGES FOR ROLE windmill IN SCHEMA public GRANT ALL ON SEQUENCES TO windmill_admin;
        - ALTER DEFAULT PRIVILEGES FOR ROLE windmill IN SCHEMA public GRANT ALL ON FUNCTIONS TO windmill_admin;
        - ALTER DEFAULT PRIVILEGES FOR ROLE windmill IN SCHEMA public GRANT ALL ON TABLES TO windmill_user;
        - ALTER DEFAULT PRIVILEGES FOR ROLE windmill IN SCHEMA public GRANT ALL ON SEQUENCES TO windmill_user;
        - ALTER DEFAULT PRIVILEGES FOR ROLE windmill IN SCHEMA public GRANT ALL ON FUNCTIONS TO windmill_user;

  storage:
    storageClass: gp3
    size: 5Gi
  walStorage:
    storageClass: gp3
    size: 5Gi

  # prometheus
  monitoring:
    enablePodMonitor: false

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: windmill-db-store

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: windmill-db-backup
  namespace: postgres
spec:
  schedule: "0 0 3 * * 5"  # At 03:00 UTC every Friday
  backupOwnerReference: self
  cluster:
    name: windmill-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
