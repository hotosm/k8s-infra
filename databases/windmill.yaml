apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: windmill-db
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/version: 18-system-trixie

spec:
  instances: 1
  description: "Windmill Database"
  imageName: "ghcr.io/cloudnative-pg/postgresql:18-system-trixie"

  primaryUpdateStrategy: unsupervised

  postgresql:
    parameters:
      # Kill idle-in-transaction sessions after 60s to release locks held by abandoned txns.
      idle_in_transaction_session_timeout: "60s"

  bootstrap:
    initdb:
      database: windmill
      owner: windmill
      secret:
        # Kubernetes basic-auth convention has keys:
        # - username
        # - password
        name: windmill-db-creds

  storage:
    storageClass: gp3
    size: 5Gi
  walStorage:
    storageClass: gp3
    size: 5Gi

  # prometheus
  monitoring:
    enablePodMonitor: false

  # see https://cloudnative-pg.io/documentation/1.22/kubernetes_upgrade/
  nodeMaintenanceWindow:
    reusePVC: false # rebuild from other replica instead

  backup:
    retentionPolicy: "60d"
    barmanObjectStore:
      destinationPath: s3://hotosm-k8s-db-backup/windmill
      endpointURL: https://s3.amazonaws.com
      s3Credentials:
        accessKeyId:
          name: s3-creds
          key: access-key-id
        secretAccessKey:
          name: s3-creds
          key: secret-access-key
      wal:
        compression: gzip # this saves a lot of storage
        encryption: AES256 # AWS managed
      data:
        compression: gzip
        encryption: AES256 # AWS managed
        jobs: 2
