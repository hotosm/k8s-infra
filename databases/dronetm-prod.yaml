apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: dronetm-db-prod-store
  namespace: postgres
spec:
  retentionPolicy: "60d"
  configuration:
    destinationPath: s3://hotosm-k8s-db-backup/dronetm-prod
    endpointURL: https://s3.amazonaws.com
    s3Credentials:
      accessKeyId:
        name: s3-creds
        key: access-key-id
      secretAccessKey:
        name: s3-creds
        key: secret-access-key
    wal:
      compression: gzip # this saves a lot of storage
      encryption: AES256 # AWS managed
    data:
      compression: gzip
      encryption: AES256 # AWS managed
      jobs: 2

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dronetm-db-prod
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/version: 16-3-system-trixie

spec:
  instances: 1
  description: "DroneTM Database"
  imageName: "ghcr.io/cloudnative-pg/postgis:16-3-system-trixie"

  primaryUpdateStrategy: unsupervised
  # PDB (voluntary-eviction guard) disabled - single replica would otherwise block node drains on cluster upgrade
  enablePDB: false

  postgresql:
    parameters:
      # Kill idle-in-transaction sessions after 60s to release locks held by abandoned txns.
      idle_in_transaction_session_timeout: "60s"

  bootstrap:
    initdb:
      database: drone_tm_prod
      owner: drone_tm_prod_rw
      secret:
        # Kubernetes basic-auth convention has keys:
        # - username
        # - password
        name: dronetm-db-prod-creds
      # Required to enable PostGIS
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis;
        - CREATE EXTENSION IF NOT EXISTS postgis_tiger_geocoder CASCADE;
        - CREATE EXTENSION IF NOT EXISTS postgis_topology CASCADE;
        - CREATE EXTENSION IF NOT EXISTS fuzzystrmatch;

  storage:
    storageClass: gp3
    size: 20Gi
  walStorage:
    storageClass: gp3
    size: 20Gi

  # prometheus
  monitoring:
    enablePodMonitor: false

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: dronetm-db-prod-store

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: dronetm-db-prod-backup
  namespace: postgres
spec:
  schedule: "0 0 1 * * *"  # At 01:00 UTC every day
  backupOwnerReference: self
  cluster:
    name: dronetm-db-prod
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io

