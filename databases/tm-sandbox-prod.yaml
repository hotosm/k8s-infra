apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: tm-sandbox-db-prod
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/version: 16-3-system-trixie

spec:
  instances: 1
  description: "TM Sandbox Database"
  imageName: "ghcr.io/cloudnative-pg/postgis:16-3-system-trixie"

  primaryUpdateStrategy: unsupervised

  bootstrap:
    initdb:
      database: tm_sandbox
      owner: tm_sandbox_rw
      secret:
        # Kubernetes basic-auth convention has keys:
        # - username
        # - password
        name: tm-sandbox-db-prod-creds
      # Required to enable PostGIS
      postInitApplicationSQL:
        - CREATE EXTENSION IF NOT EXISTS postgis;
        - CREATE EXTENSION IF NOT EXISTS postgis_tiger_geocoder CASCADE;
        - CREATE EXTENSION IF NOT EXISTS postgis_topology CASCADE;
        - CREATE EXTENSION IF NOT EXISTS fuzzystrmatch;

  storage:
    storageClass: gp3
    size: 5Gi
  walStorage:
    storageClass: gp3
    size: 3Gi

  # prometheus
  monitoring:
    enablePodMonitor: false

  # see https://cloudnative-pg.io/documentation/1.22/kubernetes_upgrade/
  nodeMaintenanceWindow:
    reusePVC: false # rebuild from other replica instead

  backup:
    retentionPolicy: "30d"
    barmanObjectStore:
      destinationPath: s3://hotosm-k8s-db-backup/tm-sandbox-prod
      endpointURL: https://s3.amazonaws.com
      s3Credentials:
        accessKeyId:
          name: s3-creds
          key: access-key-id
        secretAccessKey:
          name: s3-creds
          key: secret-access-key
      wal:
        compression: gzip # this saves a lot of storage
      data:
        compression: gzip
        jobs: 2

