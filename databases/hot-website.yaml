apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: hot-website-db-store
  namespace: postgres
spec:
  retentionPolicy: "60d"
  configuration:
    destinationPath: s3://hotosm-k8s-db-backup/hot-website
    endpointURL: https://s3.amazonaws.com
    s3Credentials:
      accessKeyId:
        name: s3-creds
        key: access-key-id
      secretAccessKey:
        name: s3-creds
        key: secret-access-key
    wal:
      compression: gzip # this saves a lot of storage
      encryption: AES256 # AWS managed
    data:
      compression: gzip
      encryption: AES256 # AWS managed
      jobs: 2

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: hot-website-db
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/version: 18-system-trixie

spec:
  instances: 1
  description: "HOT Website Database"
  imageName: "ghcr.io/cloudnative-pg/postgresql:18-system-trixie"

  primaryUpdateStrategy: unsupervised
  # PDB (voluntary-eviction guard) disabled - single replica would otherwise block node drains on cluster upgrade
  enablePDB: false

  postgresql:
    parameters:
      # Kill idle-in-transaction sessions after 60s to release locks held by abandoned txns.
      idle_in_transaction_session_timeout: "60s"

  bootstrap:
    initdb:
      database: hotosm
      owner: hotosm
      secret:
        # Kubernetes basic-auth convention has keys:
        # - username
        # - password
        name: hot-website-db-creds

  storage:
    storageClass: gp3
    size: 2Gi
  walStorage:
    storageClass: gp3
    size: 2Gi

  # prometheus
  monitoring:
    enablePodMonitor: false

  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: hot-website-db-store

---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: hot-website-db-backup
  namespace: postgres
spec:
  schedule: "0 0 2 * * *"  # At 02:00 UTC every day
  backupOwnerReference: self
  cluster:
    name: hot-website-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
