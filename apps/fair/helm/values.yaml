externalDatabase:
  host: "fair-db-staging-rw.postgres.svc.cluster.local"
  database: ai
  username: fair
  existingSecret: fair-db-creds
  existingSecretKey: password

ingress:
  enabled: true
  className: nginx
  hosts:
    - host: fair.hotosm.org
      paths:
        - path: /api
          pathType: Prefix

backend:
  envFrom:
    - secretRef:
        name: fair-api-credentials

frontend:
  mode: cloudfront
  runtimeEnv:
    VITE_API_URL: 'https://stage.api.ai.hotosm.org'
    VITE_AUTH_PROVIDER: 'hanko'
    VITE_HANKO_URL: 'https://dev.login.hotosm.org'
  cloudfront:
    roleArn: "arn:aws:iam::670261699094:role/dronetm-prod-frontend-cloudfront-deploy"
    region: us-east-1
    s3Bucket: hotosm-fair-staging-frontend
    aliases:
      - stage.ai.hotosm.org
    acmCertificateArn: 'arn:aws:acm:us-east-1:670261699094:certificate/e6eaaa9c-0de8-4222-b8f9-0e8c3e56f813'
    priceClass: PriceClass_All


env: 
  DEBUG: "false"
  AUTH_PROVIDER: "hanko"
  HOSTNAME: "stage.api.ai.hotosm.org"
  API_BASE_URL: "https://stage.api.ai.hotosm.org/api/v1"
  FRONTEND_URL: "https://stage.ai.hotosm.org"
  ALLOWED_HOSTS: "stage.api.ai.hotosm.org"
  CSRF_TRUSTED_ORIGINS: "https://stage.api.ai.hotosm.org,https://stage.ai.hotosm.org,http://localhost:5173,http://localhost:3500,http://127.0.0.1:5173,http://127.0.0.1:3500"
  CORS_ALLOWED_ORIGINS: "https://stage.ai.hotosm.org,http://localhost:5173,http://localhost:3500,http://127.0.0.1:5173,http://127.0.0.1:3500"
  SECURE_SSL_REDIRECT: "true"
  DATABASE_SSL_MODE: "require"
  FAIR_ZENML_STORE_URL: "https://zenml.ai.hotosm.org"
  ZENML_STORE_VERIFY_SSL: "false"
  ZENML_CONFIG_PATH: "/tmp/zenml"
  ZENML_ACTIVE_STACK_ID: "b9090be8-caf1-494e-8c45-cc636234d889"
  HOME: "/tmp"
  # fair.zenml.config._workload_selector reads this to build pipeline-pod
  # nodeSelectors. Must match the live label-domain on the ml node-pool
  # (see dok8s/main.tf labels)
  FAIR_LABEL_DOMAIN: "fair-k8s"
  FAIR_UPLOAD_ARTIFACTS: "true"
  FAIR_STAC_API_URL: "https://stac.ai.hotosm.org/stac"
  BUCKET_NAME: "hotosm-fair-models-staging"
  PARENT_BUCKET_FOLDER: "backend"
  AWS_REGION: "us-east-1"
  AWS_ENDPOINT_URL: "https://s3.us-east-1.amazonaws.com"
  FAIR_S3_UPLOAD_ACL: "public-read"
  FAIR_DOMAIN: "ai.hotosm.org"
  LOG_PATH: "/tmp/fair-logs"
  RAW_DATA_API_URL: "https://api-prod.raw-data.hotosm.org/v1"
  HANKO_API_URL: "https://dev.login.hotosm.org"
  COOKIE_DOMAIN: ".hotosm.org"
  EMAIL_HOST: "email-smtp.us-east-1.amazonaws.com"
  EMAIL_PORT: "587"
  EMAIL_USE_TLS: "true"
  DEFAULT_FROM_EMAIL: "no-reply@fair.hotosm.org"

  