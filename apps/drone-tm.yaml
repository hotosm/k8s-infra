apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: drone-tm
  namespace: argocd
spec:
  project: default
  sources:
    # Helm chart + values
    - repoURL: oci://ghcr.io/hotosm/charts/drone-tm
      chart: drone-tm
      # Auto-track the highest published chart. Chart templates default
      # image.tag to .Chart.AppVersion, so cutting a release in the app
      # repo (which bumps chart version + appVersion together) is what
      # promotes the new image to prod. Pin an exact version here to
      # freeze deploys.
      targetRevision: "*"
      helm:
        releaseName: drone-tm-prod
        valueFiles:
          - $k8s-infra/apps/drone-tm/helm/values.yaml

    # Git repo containing values.yaml
    - repoURL: https://github.com/hotosm/k8s-infra.git
      targetRevision: HEAD
      ref: k8s-infra

    # Extra resources
    - repoURL: https://github.com/hotosm/k8s-infra.git
      targetRevision: HEAD
      path: apps/drone-tm
  destination:
    server: https://kubernetes.default.svc
    namespace: drone
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
