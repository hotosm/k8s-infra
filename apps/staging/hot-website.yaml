# On-demand staging deploys of hot-website driven by staging->main PRs.
#
# Behaviour:
#   - PR opened with head=staging targeting base=main   -> Application created.
#   - Namespace auto-created via CreateNamespace=true (not managed by the
#     Application, so it survives teardown).
#   - Workloads (sealed secret, quota/limits, chart) sync into website-staging.
#     Quota/limits/sealed-secret carry Delete=false so the resources-finalizer
#     leaves them behind when the Application is deleted.
#   - Karpenter's cpu-autoscale NodePool spins a spot node from 0.
#   - Each subsequent push to staging changes head_sha -> the sha-tagged image
#     changes -> Deployment spec changes -> pod rolls cleanly.
#   - PR merged/closed -> Application deleted, resources-finalizer prunes only
#     the Helm-managed workload (Deployment, Service, StatefulSet, Ingress,
#     Job, chart Secrets). Namespace + bootstrap resources persist so the next
#     PR lands cleanly. Node scales back to 0.
#
# Keeping the namespace across PRs avoids the classic stuck-Terminating wedge
# (cert-manager Certificate/Order finalizers, ingress webhook flakes, etc).
# GitHub only allows one PR per head->base branch pair, so concurrent
# staging->main PRs are impossible - no shared-namespace clobber to worry about.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: hot-website-staging
  namespace: argocd
spec:
  goTemplate: true
  generators:
    - pullRequest:
        github:
          owner: hotosm
          repo: website
        # Public repo -> anonymous GitHub API. ~60 req/hr limit is fine with
        # this cadence and a single ApplicationSet; add a token if we scale up.
        requeueAfterSeconds: 300
        filters:
          - branchMatch: "^staging$"
            targetBranchMatch: "^main$"
  template:
    metadata:
      name: "hot-website-staging-pr-{{ .number }}"
      finalizers:
        - resources-finalizer.argoproj.io
    spec:
      project: default
      sources:
        # Chart pulled from the PR's own commit so chart changes in the PR
        # get exercised too.
        - repoURL: https://github.com/hotosm/website.git
          targetRevision: "{{ .head_sha }}"
          path: chart
          helm:
            releaseName: hot-website
            valueFiles:
              - $k8s-infra/apps/staging/hot-website/helm/values.yaml
            parameters:
              # Immutable per-commit tag from CI (docker/metadata-action
              # type=sha,format=long). Changing tag on every push means the
              # Deployment spec changes and the pod rolls cleanly - no mutable
              # tag race, no annotation hack.
              - name: image.tag
                value: "sha-{{ .head_sha }}"
        - repoURL: https://github.com/hotosm/k8s-infra.git
          targetRevision: HEAD
          ref: k8s-infra
        # Extra resources for staging (namespace, sealed secret). Non-recursive
        # by default, so helm/values.yaml one level down is not applied.
        - repoURL: https://github.com/hotosm/k8s-infra.git
          targetRevision: HEAD
          path: apps/staging/hot-website
      destination:
        server: https://kubernetes.default.svc
        namespace: website-staging
      syncPolicy:
        automated:
          selfHeal: true
          prune: true
        syncOptions:
          - CreateNamespace=true
        managedNamespaceMetadata:
          labels:
            environment: staging
            app: hot-website
