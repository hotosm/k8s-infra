# RBAC for ZenML orchestrator to spawn pipeline Jobs/CronJobs in
# fair-staging. Persistent so re-created SAs don't break in-flight pods.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zenml-service-connector
  namespace: fair-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zenml-pod-account
  namespace: fair-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zenml-orchestrator-service-role
  namespace: fair-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "create", "patch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: zenml-orchestrator-pod-role
  namespace: fair-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zenml-service-binding
  namespace: fair-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zenml-orchestrator-service-role
subjects:
  - kind: ServiceAccount
    name: zenml-service-connector
    namespace: fair-staging
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: zenml-pod-binding
  namespace: fair-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: zenml-orchestrator-pod-role
subjects:
  - kind: ServiceAccount
    name: zenml-pod-account
    namespace: fair-staging
