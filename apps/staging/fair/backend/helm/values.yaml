# Staging overrides for fair backend. Chart pulled from PR head_sha
# (see ../../fair.yaml).
#
# ALLOWED_HOSTS must include localhost - kubelet probes send Host: localhost.
backendReplicaCount: 1

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: api.stage.ai.hotosm.org
    external-dns.alpha.kubernetes.io/ttl: "300"
  hosts:
    - host: api.stage.ai.hotosm.org
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: fair-staging-tls
      hosts:
        - api.stage.ai.hotosm.org

backend:
  envFrom:
    - secretRef:
        name: fair-api-credentials

  djangoQ:
    enabled: false

  env:
    DEBUG: "false"
    AUTH_PROVIDER: "hanko"
    HOSTNAME: "stage.ai.hotosm.org"
    VITE_BASE_API_URL: "https://stage.ai.hotosm.org"
    API_BASE_URL: "https://stage.ai.hotosm.org/api/v1"
    FRONTEND_URL: "https://stage.ai.hotosm.org"
    ALLOWED_HOSTS: "stage.ai.hotosm.org,localhost"
    CSRF_TRUSTED_ORIGINS: "https://stage.ai.hotosm.org,http://localhost:5173,http://localhost:3500,http://127.0.0.1:5173,http://127.0.0.1:3500"
    CORS_ALLOWED_ORIGINS: "https://stage.ai.hotosm.org,http://localhost:5173,http://localhost:3500,http://127.0.0.1:5173,http://127.0.0.1:3500"
    SECURE_SSL_REDIRECT: "true"
    # Bundled in-cluster postgres has no TLS.
    DATABASE_SSL_MODE: "disable"
    FAIR_ZENML_STORE_URL: "https://zenml.stage.ai.hotosm.org"
    ZENML_STORE_VERIFY_SSL: "false"
    ZENML_CONFIG_PATH: "/tmp/zenml"
    ZENML_ACTIVE_STACK_ID: "b9090be8-caf1-494e-8c45-cc636234d889"
    HOME: "/tmp"
    # Must match the ml node-pool label-domain (dok8s/main.tf).
    FAIR_LABEL_DOMAIN: "fair-k8s"
    FAIR_UPLOAD_ARTIFACTS: "true"
    FAIR_STAC_API_URL: "https://stac.stage.ai.hotosm.org/stac"
    BUCKET_NAME: "hotosm-fair-models-staging"
    PARENT_BUCKET_FOLDER: "backend"
    AWS_REGION: "us-east-1"
    AWS_ENDPOINT_URL: "https://s3.us-east-1.amazonaws.com"
    FAIR_S3_UPLOAD_ACL: "public-read"
    FAIR_DOMAIN: "stage.ai.hotosm.org"
    LOG_PATH: "/tmp/fair-logs"
    RAW_DATA_API_URL: "https://api-prod.raw-data.hotosm.org/v1"
    HANKO_API_URL: "https://dev.login.hotosm.org"
    COOKIE_DOMAIN: ".hotosm.org"
    EMAIL_HOST: "email-smtp.us-east-1.amazonaws.com"
    EMAIL_PORT: "587"
    EMAIL_USE_TLS: "true"
    DEFAULT_FROM_EMAIL: "no-reply@fair.hotosm.org"


# Prod uses S3+cloudfront, but staging is a simple Django+Whitenoise
# Frontend dist served.
frontend:
  tag: stage
  mode: bundleWithBackend


# Bundled Postgres Chart injects DATABASE_URL, overriding the sealed secret.
postgres:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

