---
## TODO: For now we need to manually apply this with kubectl apply -f apps/staging/fair/fair-api-creds.yaml
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: fair-api-credentials
  namespace: fair-staging
spec:
  encryptedData:
    AWS_ACCESS_KEY_ID: 
    AWS_SECRET_ACCESS_KEY: 
    COOKIE_SECRET: 
    EMAIL_HOST_PASSWORD: 
    EMAIL_HOST_USER: 
    FAIR_DEV_TOKEN: 
    LOGIN_INTERNAL_API_KEY: 
    OSM_CLIENT_ID: 
    OSM_CLIENT_SECRET: 
    SECRET_KEY: 
    ZENML_STORE_API_KEY: 
  template:
    metadata:
      annotations:
        argocd.argoproj.io/sync-options: Prune=false,Delete=false
      name: fair-api-credentials
      namespace: fair-staging
    type: Opaque
