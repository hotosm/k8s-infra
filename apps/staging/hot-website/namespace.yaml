apiVersion: v1
kind: Namespace
metadata:
  name: staging-website
  labels:
    environment: staging
    app: hot-website
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: staging-website-quota
  namespace: staging-website
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: staging-website-limits
  namespace: staging-website
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
