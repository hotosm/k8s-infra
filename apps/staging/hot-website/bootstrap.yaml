apiVersion: v1
kind: ResourceQuota
metadata:
  name: website-staging-quota
  namespace: website-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 4Gi
    limits.cpu: "4"
    limits.memory: 8Gi
    pods: "30"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: website-staging-limits
  namespace: website-staging
  annotations:
    argocd.argoproj.io/sync-options: Prune=false,Delete=false
spec:
  limits:
    - type: Container
      default:
        cpu: 500m
        memory: 512Mi
      defaultRequest:
        cpu: 100m
        memory: 128Mi
