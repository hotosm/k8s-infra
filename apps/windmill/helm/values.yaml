windmill:
  baseDomain: tasks.k8s-prod.hotosm.org

  # Secret in the windmill namespace with the full Postgres URL under key `url`.
  databaseUrlSecretName: windmill-db-url

  # Disable LSP / Multiplayer / Debugger sidecar deployment.
  extraReplicas: 0

  # Single worker group, one replica. Jobs run inline in the worker pod
  # (unshare + bubblewrap sandbox); workers do not spawn per-job pods.
  # So essentially with relicas:1 we can run one job at a time, sequentially.
  workerGroups:
    - name: default
      replicas: 1
      # TODO leave unbounded until we address:
      # https://github.com/hotosm/k8s-infra/issues/4#issuecomment-4513081083
      # and add the `highmem` group below
      # resources:
      #   requests:
      #     cpu: "500m"
      #     memory: "1Gi"
      #   limits:
      #     memory: "4Gi"
    # For the windmill script / job, set worker group tag to `highmem`
    # This should rely on KEDA to autoscale based on the Postgres queue.
    # If `highmem` jobs are pending, KEDA will scale 0 --> 1 workers.
    # - name: highmem
    #   replicas: 0
    #   resources:
    #     requests:
    #       cpu: "2000m"
    #       memory: "8Gi"
    #     limits:
    #       memory: "10Gi"
    #   extraEnv:
    #     - name: WORKER_TAGS
    #       value: "highmem"

  # Full-text search indexer; off to save resources for now.
  indexer:
    enabled: false

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: tasks.k8s-prod.hotosm.org
    external-dns.alpha.kubernetes.io/ttl: "300"
  tls:
    - hosts:
        - tasks.k8s-prod.hotosm.org
      secretName: windmill-tls

# Chart bundles a demo Postgres (cloudnative-pg) plus a demo app; we use our
# own CNPG cluster in the postgres namespace, so disable both.
postgresql:
  enabled: false
