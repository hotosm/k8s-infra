windmill:
  baseDomain: tasks.k8s-prod.hotosm.org

  # Secret in the windmill namespace with the full Postgres URL under key `url`.
  databaseUrlSecretName: windmill-db-url

  # Disable LSP / Multiplayer / Debugger sidecar deployment.
  extraReplicas: 0

  # Single worker group, one replica. Jobs run inline in the worker pod
  # (unshare + bubblewrap sandbox); workers do not spawn per-job pods.
  # So essentially with relicas:1 we can run one job at a time, sequentially.
  workerGroups:
    - name: default
      replicas: 1

    # Heavy batch jobs (e.g. monthly country exports). Scripts tagged `heavy`
    # in the Windmill UI run here. Scales 0 -> 2 with KEDA based on the Postgres
    # job queue (see scaledobject.yaml), landing on the cpu-autoscale Karpenter
    # pool so nodes only exist while jobs run.
    #
    # replicas must be >= 1 for the chart to render the Deployment; KEDA then
    # owns the replica count 0..2. ArgoCD ignores .spec.replicas for this
    # Deployment (see apps/windmill.yaml ignoreDifferences) so it does not fight
    # KEDA scaling to zero.
    - name: heavy
      replicas: 1
      resources:
        requests:
          cpu: "4"
          memory: "12Gi"
        limits:
          memory: "12Gi"
      nodeSelector:
        node-type: cpu
        nodegroup: autoscale
      tolerations:
        - key: spot
          operator: Exists
      extraEnv:
        - name: WORKER_TAGS
          value: "heavy"

  # Full-text search indexer; off to save resources for now.
  indexer:
    enabled: false

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    external-dns.alpha.kubernetes.io/hostname: tasks.k8s-prod.hotosm.org
    external-dns.alpha.kubernetes.io/ttl: "300"
  tls:
    - hosts:
        - tasks.k8s-prod.hotosm.org
      secretName: windmill-tls

# Chart bundles a demo Postgres (cloudnative-pg) plus a demo app; we use our
# own CNPG cluster in the postgres namespace, so disable both.
postgresql:
  enabled: false
