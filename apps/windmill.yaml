apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: windmill
  namespace: argocd
spec:
  project: default
  sources:
    # Helm chart + values
    - repoURL: https://windmill-labs.github.io/windmill-helm-charts
      chart: windmill
      targetRevision: 4.0.215
      helm:
        releaseName: windmill
        valueFiles:
          - $k8s-infra/apps/windmill/helm/values.yaml

    # Git repo containing values.yaml
    - repoURL: https://github.com/hotosm/k8s-infra.git
      targetRevision: HEAD
      ref: k8s-infra

    # Extra resources
    - repoURL: https://github.com/hotosm/k8s-infra.git
      targetRevision: HEAD
      path: apps/windmill
  destination:
    server: https://kubernetes.default.svc
    namespace: windmill
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
  # The heavy worker group is scaled by KEDA (0..2); ignore its replica count
  # so selfHeal does not fight KEDA and reset it back to the chart's value.
  ignoreDifferences:
    - group: apps
      kind: Deployment
      name: windmill-workers-heavy
      namespace: windmill
      jqPathExpressions:
        - .spec.replicas
