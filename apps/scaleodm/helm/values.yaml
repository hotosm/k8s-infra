secrets:
  runtime:
    name: "scaleodm-secrets"
    keys:
      databaseUrl: "SCALEODM_DATABASE_URL"
      s3Endpoint: "AWS_S3_ENDPOINT"
      accessKey: "AWS_ACCESS_KEY_ID"
      secretKey: "AWS_SECRET_ACCESS_KEY"
      region: "AWS_DEFAULT_REGION"

# Deploys "scaleodm-workspace" used below
workspaceStorageClass:
  create: true

config:
  observability:
    enabled: false
    serviceName: "scaleodm"
    serviceVersion: ""
    otlpEndpoint: ""
    otlpInsecure: false
    metricsEnabled: true
    tracesEnabled: true
    traceSampleRatio: 0.1

  # Defaults, except gp3 storageclass
  workflow:
    activeDeadlineSeconds: 21600
    workspace:
      mode: auto
      size: "30Gi"
      # Can't use standard 'gp3' storageclass, as we have Retain on delete
      # but the pv's here are temp and should be cleaned up automatically
      storageClass: "scaleodm-workspace"
      accessMode: ReadWriteOnce
      dynamicSize:
        enabled: true
        maxGiB: 1024
        fallbackMBPerImage: 20
        # Profile order: fastOrtho, then dsmDtm, then standard.
        fastOrtho:
          multiplier: 3
          minGiB: 30
        standard:
          multiplier: 8
          minGiB: 70
        # DSM/DTM jobs need more space for DEM outputs and intermediates.
        dsmDtm:
          multiplier: 12
          minGiB: 100
    retryLimit: 1
    retryBackoffDuration: "60s"
    retryBackoffFactor: "2"
    retryBackoffMaxDuration: "6h"
    ttlSuccessSeconds: 86400
    ttlFailureSeconds: 604800
    podGCStrategy: "OnWorkflowSuccess"
    podGCDeleteDelaySeconds: 300
    # Default Karpenter node pool for workflow pods.
    # "spot" is cheapest; use "on-demand" for stable capacity.
    # Individual submissions can override this via the capacityType API field.
    capacityType: "spot"

  processSizing:
    memoryLimitMarginPercent: 20
    memoryMinGiB: 4
    memoryMaxGiB: 256
    cpuPerGiB: 0.25
    cpuLimitMultiplier: 1.5
    ephemeralGiBPerGiBRAM: 0.3
    ephemeralLimitMultiplier: 1.2
    fastOrthoMemoryMultiplier: 0.5
    dsmDtmMemoryMultiplier: 1.5

argo:
  controller:
    # Only allow 5 jobs to run at a time for now
    parallelism: 5
  artifactRepository:
    archiveLogs: true
    s3:
      bucket: hotosm-argo-logs
      endpoint: s3.amazonaws.com
      region: us-east-1
      insecure: false
      useSDKCreds: false
      accessKeySecret:
        name: argo-logs-s3-creds
        key: AWS_ACCESS_KEY_ID
      secretKeySecret:
        name: argo-logs-s3-creds
        key: AWS_SECRET_ACCESS_KEY
      keyFormat: "{{workflow.namespace}}/{{workflow.name}}/{{pod.name}}"

ingress:
  # Enables ingress that exposes only /ui and /ui/... routes.
  # This is safe with api.service.type=ClusterIP because browser requests hit
  # /ui/api on the same ingress host, then the in-cluster UI handler fetches
  # internal data server-side and returns JSON to the browser.
  # Security guardrail: requires config.ui.enabled=true.
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    external-dns.alpha.kubernetes.io/hostname: processing.drone.hotosm.org
    external-dns.alpha.kubernetes.io/ttl: "300"
    # Redirect to access /ui path by default
    nginx.ingress.kubernetes.io/app-root: /ui
  hosts:
    - host: processing.drone.hotosm.org
  tls:
    - hosts:
        - processing.drone.hotosm.org
      secretName: scaleodm-tls
