apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knative-operator
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://knative.github.io/operator'
    targetRevision: 1.22.1 # The 'knative-v' prefix must be removed for Helm
    chart: knative-operator

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true