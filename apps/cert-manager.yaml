apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
spec:
  project: default
  sources:
    # Helm chart + values
    - repoURL: https://charts.jetstack.io
      chart: cert-manager
      targetRevision: v1.17.1
      helm:
        releaseName: cert-manager
        valuesObject:
          installCRDs: true

    # Extra resources (ClusterIssuers, etc.)
    - repoURL: https://github.com/hotosm/k8s-infra.git
      path: apps/cert-manager
      targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
