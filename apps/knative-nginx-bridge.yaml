apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: knative-nginx-bridge
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/hotosm/k8s-infra'
    targetRevision: main
    # Pointing to a new subfolder
    path: apps/knative-nginx-bridge-config 
  destination:
    server: 'https://kubernetes.default.svc'
    # Deploying into the namespace we created earlier
    namespace: knative-serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true