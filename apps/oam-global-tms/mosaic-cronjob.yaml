# This manifest generates the global coverage vector PMTiles layer for OpenAerialMap, available at
# http://s3.amazonaws.com/oin-hotosm-temp/global-coverage.pmtiles
apiVersion: batch/v1
kind: CronJob
metadata:
  name: oam-global-mosaic
  namespace: eoapi
  labels:
    app: oam-global-mosaic
spec:
  # Every 12hrs
  schedule: "0 */12 * * *"
  # Prevent running multiple jobs concurrently
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: oam-global-mosaic
        spec:
          restartPolicy: Never
          containers:
            - name: oam-global-mosaic
              image: ghcr.io/hotosm/openaerialmap/global-mosaic:main
              imagePullPolicy: Always
              resources:
                requests:
                  # It's a more CPU-intensive job - tippecanoe uses concurrency
                  cpu: "1000m"
                  memory: "1Gi"
                limits:
                  cpu: "2000m"
                  memory: "2Gi"
              env:
                - name: PGUSER
                  valueFrom:
                    secretKeyRef:
                      key: user
                      name: eoapi-pguser-eoapi
                - name: PGPORT
                  valueFrom:
                    secretKeyRef:
                      key: port
                      name: eoapi-pguser-eoapi
                - name: PGHOST
                  valueFrom:
                    secretKeyRef:
                      key: host
                      name: eoapi-pguser-eoapi
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      key: password
                      name: eoapi-pguser-eoapi
                - name: PGDATABASE
                  valueFrom:
                    secretKeyRef:
                      key: dbname
                      name: eoapi-pguser-eoapi
                - name: S3_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      key: S3_ACCESS_KEY
                      name: oam-s3-creds
                - name: S3_SECRET_KEY
                  valueFrom:
                    secretKeyRef:
                      key: S3_SECRET_KEY
                      name: oam-s3-creds
      # do not attempt retry
      backoffLimit: 0
