apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Explicitly scope all resources to the production namespace
namespace: zenml-prod

resources:
  - sealed-extra-secrets.yaml
  - orchestrator-role.yaml

patches:
  # Apply the same labeling structure as staging, but specifically for production
  - target:
      kind: Deployment
      name: zenml
      # Target the production-specific instance
      namespace: zenml-prod
    patch: |-
      - op: add
        path: /spec/template/metadata/labels/project
        value: fair
      - op: add
        path: /spec/template/metadata/labels/tool
        value: fair

# Aligning with your staging structure, ensure the helm chart is correctly 
# pointed to the production release
helmCharts:
  - name: zenml
    repo: https://charts.zenml.io 
    version: 0.94.2              
    releaseName: zenml-prod
    valuesFile: helm/values.yaml
    namespace: zenml-prod