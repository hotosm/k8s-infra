apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oam
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/hotosm/k8s-infra'
    targetRevision: main
    path: apps/oam
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: eoapi
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
