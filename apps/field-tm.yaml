apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: field-tm
  namespace: argocd
spec:
  project: default
  sources:
    # Helm chart + values
    - repoURL: oci://ghcr.io/hotosm/charts/field-tm
      chart: field-tm
      # Auto-track the highest published chart. Chart templates default
      # image.tag to .Chart.AppVersion, so cutting a release in the app
      # repo promotes the new image to prod. Pin here to freeze deploys.
      targetRevision: "*"
      helm:
        releaseName: field-tm-prod
        valueFiles:
          - $k8s-infra/apps/field-tm/helm/values.yaml

    # Git repo containing values.yaml
    - repoURL: https://github.com/hotosm/k8s-infra.git
      targetRevision: HEAD
      ref: k8s-infra

    # Extra resources
    - repoURL: https://github.com/hotosm/k8s-infra.git
      targetRevision: HEAD
      path: apps/field-tm
  destination:
    server: https://kubernetes.default.svc
    namespace: field
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
