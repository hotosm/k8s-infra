apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: autoscale-gpu
spec:
  amiFamily: AL2023

  role: KarpenterNodeRole-hotosm-production-cluster

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: hotosm-production-cluster
        kubernetes.io/role/internal-elb: "1"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: hotosm-production-cluster

  blockDeviceMappings:
    - deviceName: /dev/sda1
      rootVolume: true
      ebs:
        volumeSize: 50Gi
        volumeType: gp3
        deleteOnTermination: true

  tags:
    Name: karpenter-autoscale-gpu
    karpenter.sh/discovery: hotosm-production-cluster

  # Pin to the tested EKS-optimized AL2023 NVIDIA AMI release for Kubernetes
  # 1.33. The AMI includes the host NVIDIA driver, CUDA user-mode driver, and
  # NVIDIA Container Toolkit.
  #
  # The only missing piece is the Kubernetes device plugin, installed
  # separately by the nvidia-device-plugin ArgoCD app.
  amiSelectorTerms:
    - name: amazon-eks-node-al2023-x86_64-nvidia-1.33-v20260129
      owner: "602401143452"
