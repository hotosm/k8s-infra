apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: autoscale
spec:
  role: KarpenterNodeRole-hotosm-production-cluster

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: hotosm-production-cluster
        # Force to private subnets only
        kubernetes.io/role/internal-elb: "1"

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: hotosm-production-cluster

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        # Increased from 50Gi --> 250Gi to allow bigger ScaleODM jobs to run
        # (they need a large amount of ephemeral storage)
        # 300Gi would cost approx $0.67/hr
        volumeSize: 250Gi
        volumeType: gp3
        deleteOnTermination: true

  tags:
    Name: karpenter-autoscale
    karpenter.sh/discovery: hotosm-production-cluster

  # Pin the EKS-optimized AL2023 AMI release for production instead of using
  # @latest, which can drift nodes to untested AMIs during replacement.
  # Amazon Linux 2023.10.20260216
  # v1.33.8-eks-f69f56f
  # Update this as we upgrade the cluster!
  amiSelectorTerms:
    - alias: al2023@v20260224
