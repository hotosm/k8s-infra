# Can autoscale to 0
# Prefer spot instances if available

apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: cpu-autoscale
spec:
  template:
    metadata:
      labels:
        nodegroup: autoscale
        node-type: cpu
        capacity: spot
    spec:
      nodeClassRef:
        name: autoscale
        group: karpenter.k8s.aws
        kind: EC2NodeClass

      taints:
        - key: spot
          value: "true"
          effect: PreferNoSchedule

      requirements:
        # Use x86 families only; the EC2NodeClass points at an amd64 AMI.
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]

        # C families keep cheaper CPU-heavy options available for workloads
        # that do not need much memory.
        # M families are the general-purpose default for balanced workloads.
        # R families are required to reach 256Gi on a 32 vCPU node; 48 vCPU
        # R nodes exceed this pool's 256Gi aggregate memory cap.
        # Include Intel (*i) and AMD (*a) x86 families for better capacity.
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values:
            - c6a
            - c6i
            - c7a
            - c7i
            - m6a
            - m6i
            - m7a
            - m7i
            - r6a
            - r6i
            - r7a
            - r7i

        # Keep individual nodes at or below 48 vCPU while allowing Karpenter
        # to choose smaller nodes for smaller pods.
        - key: karpenter.k8s.aws/instance-cpu
          operator: In
          values: ["4", "8", "16", "32", "48"]

        - key: karpenter.k8s.aws/instance-generation
          operator: Gt
          values: ["5"]

        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]

  limits:
    # Aggregate NodePool cap, not a per-pod limit. A 256Gi EC2 node has less
    # allocatable memory after VM overhead and kube/system reservations.
    cpu: "48"
    memory: 256Gi

  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 30s
