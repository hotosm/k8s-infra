# We install metrics-server cluster-wide via ArgoCD instead.
# This chart doesn't support disabling it, so prevent conflicts
# by stopping it from registering the API service and scale to 0.
metrics-server:
  apiService:
    create: false
  replicas: 0

prometheus-adapter:
  prometheus:
    url: http://eoapi-support-prometheus-server.eoapi-support.svc.cluster.local

prometheus:
  server:
    service:
      type: ClusterIP
      annotations: { }
    ingress:
      annotations:
        nginx.ingress.kubernetes.io/auth-type: basic
        nginx.ingress.kubernetes.io/auth-secret: eoapi-support-prometheus
        nginx.ingress.kubernetes.io/auth-realm: 'Authentication Required'
        nginx.ingress.kubernetes.io/enable-cors: "true"
        nginx.ingress.kubernetes.io/enable-access-log: "true"
        cert-manager.io/cluster-issuer: "letsencrypt-prod"
        external-dns.alpha.kubernetes.io/hostname: metrics.k8s-prod.hotosm.org
        external-dns.alpha.kubernetes.io/ttl: "300"
      enabled: true
      ingressClassName: nginx
      hosts:
        - metrics.k8s-prod.hotosm.org
      tls:
        - secretName: prometheus-server-tls
          hosts:
            - metrics.k8s-prod.hotosm.org
    persistentVolume:
      storageClass: gp2

grafana:
  service:
    type: ClusterIP
    annotations: { }
  ingress:
    annotations:
      nginx.ingress.kubernetes.io/enable-cors: "true"
      nginx.ingress.kubernetes.io/enable-access-log: "true"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      external-dns.alpha.kubernetes.io/hostname: dashboard.k8s-prod.hotosm.org
      external-dns.alpha.kubernetes.io/ttl: "300"
    enabled: true
    ingressClassName: nginx
    hosts:
      - dashboard.k8s-prod.hotosm.org
    tls:
      - secretName: grafana-tls
        hosts:
          - dashboard.k8s-prod.hotosm.org
  datasources:
    datasources.yaml:
      datasources:
      - name: prometheus
        orgId: 1
        type: prometheus
        url: http://eoapi-support-prometheus-server.eoapi-support.svc.cluster.local
        access: proxy
        jsonData:
          timeInterval: "5s"
        isDefault: true
        editable: true
        version: 1 # This number should be increased when changes are made to update the datasource